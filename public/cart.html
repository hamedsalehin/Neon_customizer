<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Your Neon Creator Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body { overflow: auto; background: #09090b; }
        .checkout-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 24px;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 48px;
        }
        @media (max-width: 1024px) {
            .checkout-container { grid-template-columns: 1fr; }
        }
        
        .checkout-header {
            grid-column: 1 / -1;
            margin-bottom: 20px;
        }
        .checkout-header h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px; }
        .checkout-header p { color: var(--text-secondary); }

        .order-summary-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .summary-title { font-size: 1.25rem; font-weight: 700; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding-bottom: 16px; }
        
        .cart-page-items { display: flex; flex-direction: column; gap: 20px; }
        .cart-page-item {
            display: flex;
            gap: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .cart-page-item-img {
            width: 120px;
            height: 120px;
            background: #000;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .cart-page-item-img svg { width: 90%; height: 90%; }
        
        .cart-page-item-info { flex: 1; }
        .cart-page-item-name { font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .cart-page-item-details { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5; }
        .cart-page-item-price { font-size: 1.2rem; font-weight: 700; color: #10b981; margin-top: 8px; }

        .payment-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 32px;
            height: fit-content;
            position: sticky;
            top: 24px;
        }
        .payment-row { display: flex; justify-content: space-between; margin-bottom: 12px; color: var(--text-secondary); font-size: 0.95rem; }
        .payment-row.total { color: #fff; font-size: 1.5rem; font-weight: 800; margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(255, 255, 255, 0.1); }
        
        .place-order-btn {
            width: 100%;
            padding: 18px;
            background: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 24px;
            transition: all 0.2s;
        }
        .place-order-btn:hover { background: #2563eb; transform: translateY(-2px); }
        
        .back-to-shop {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 32px;
            transition: color 0.2s;
        }
        .back-to-shop:hover { color: #fff; }
        .customer-info-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 32px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; font-weight: 500; }
        .form-group input, .form-group textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body>
    <div class="checkout-container">
        <header class="checkout-header">
            <a href="index.html" class="back-to-shop">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Back to Designer
            </a>
            <h1>Checkout</h1>
            <p id="item-count-title">You have 0 items in your cart</p>
        </header>

        <section class="checkout-main">
            <div class="customer-info-box">
                <div class="summary-title">Customer Information</div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="cust-name" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="cust-email" placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Shipping Address</label>
                    <textarea id="cust-address" rows="3" placeholder="123 Neon St, Bright City, FL 33309"></textarea>
                </div>
            </div>

            <div class="order-summary-box" style="margin-top: 32px;">
                <div class="summary-title">Order Items</div>
                <div class="cart-page-items" id="cart-page-items-list">
                    <!-- Items injected via JS -->
                </div>
            </div>
        </section>

        <aside class="payment-box">
            <div class="summary-title">Order Summary</div>
            <div class="payment-row">
                <span>Subtotal</span>
                <span id="page-subtotal">$0.00</span>
            </div>
            <div class="payment-row">
                <span>Shipping</span>
                <span>FREE</span>
            </div>
            <div class="payment-row">
                <span>Tax</span>
                <span>$0.00</span>
            </div>
            <div class="payment-row total">
                <span>Total</span>
                <span id="page-total">$0.00</span>
            </div>
            
            <button class="place-order-btn" id="place-order-btn">Complete Purchase</button>
            <p class="shipping-notice" style="margin-top: 16px;">By clicking, you agree to our terms.</p>
        </aside>
    </div>

    <script src="cart.js"></script>
</body>
</html>
